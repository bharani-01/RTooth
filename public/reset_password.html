<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - rtooth Portal</title>
  <link rel="stylesheet" href="/css/login.css">
</head>
<body>

  <!-- Header -->
  <header>
    <div class="container nav-bar">
      <a href="/" class="logo" id="header-logo">
        <img src="/images/rtooth_logo.png" alt="RTooth Logo" class="logo-img">
      </a>
      <nav class="nav-links">
      </nav>
    </div>
  </header>

  <!-- Reset Password Main Card -->
  <main class="auth-wrapper">
    <div class="auth-container">
      <div class="auth-card" id="reset-card">
        <h2 class="auth-title">Create New Password</h2>
        <p class="auth-subtitle">Choose a secure, strong password for your account.</p>

        <!-- Alerts -->
        <div class="alert alert-error" id="reset-error-alert" style="display: none;"></div>
        <div class="alert alert-success" id="reset-success-alert" style="display: none;"></div>

        <!-- Token Check Message (shown if token is invalid or parsing) -->
        <div id="token-status" class="form-help-text" style="text-align: center; margin-bottom: 20px; font-weight: 500; color: var(--primary);">
          Verifying security token...
        </div>

        <!-- Reset Password Form -->
        <form id="reset-password-form" style="display: none;">
          <div class="form-group" style="margin-bottom: 16px;">
            <label for="new-password" class="form-label">New Password</label>
            <input type="password" id="new-password" class="form-input" placeholder="Min. 8 characters" required minlength="8">
          </div>

          <div class="form-group" style="margin-bottom: 24px;">
            <label for="confirm-password" class="form-label">Confirm New Password</label>
            <input type="password" id="confirm-password" class="form-input" placeholder="Repeat your new password" required minlength="8">
          </div>

          <button type="submit" class="btn btn-primary" style="width: 100%; height: 48px; font-size: 15px;" id="reset-submit-btn">
            Update Password
          </button>
        </form>

        <!-- Back to Login option on success or failure -->
        <div id="login-redirect-container" style="display: none; text-align: center; margin-top: 20px;">
          <a href="/login" class="btn btn-secondary" style="display: inline-block; width: 100%; text-decoration: none; line-height: 46px; text-align: center; font-size: 15px; border: 1px solid var(--border-color); background: none; color: var(--text); border-radius: 6px; font-weight: 500; box-sizing: border-box; height: 48px;">Go to Sign In</a>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <div class="container">
      <p>&copy; 2026 rtooth Clinic Management Software. Powered by Node.js & Supabase. All rights reserved.</p>
    </div>
  </footer>

  <!-- Scripts -->
  <script type="module" src="/js/auth.js"></script>
</body>
</html>

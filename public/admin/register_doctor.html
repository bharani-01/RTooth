<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register Doctor - RTooth Portal</title>
  <link rel="stylesheet" href="/css/admin_register_doctor.css">
</head>
<body data-auth-required="true" data-allowed-roles="admin" class="dashboard-body">

  <!-- Header -->
  <header>
    <div class="nav-bar">
      <button class="mobile-menu-toggle" id="mobile-menu-toggle" aria-label="Toggle Menu">
        <svg viewBox="0 0 24 24">
          <path d="M3 12h18M3 6h18M3 18h18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </button>
      <div class="header-brand-area">
        <a href="/admin/index.html" class="logo" id="header-logo">
          <img src="/images/rtooth_logo.png" alt="RTooth Logo" class="logo-img">
        </a>
      </div>
      <nav class="nav-links">
        <a href="/admin/profile.html" class="user-badge-link">
          <div class="user-badge">
            <div class="user-avatar" id="admin-avatar">AD</div>
            <div class="user-info">
              <div class="user-name" id="admin-name-badge">Admin Loading...</div>
              <div class="user-role-label">System IT-Admin</div>
            </div>
          </div>
        </a>
      </nav>
    </div>
  </header>

  <!-- Dashboard Layout -->
  <main class="dashboard-layout">
    
    <!-- Dynamic Sidebar Container -->
    <aside class="sidebar" id="sidebar-container">
      <div style="color: var(--text-muted); font-size: 13px;">Loading navigation menu...</div>
    </aside>

    <!-- Main Content Area -->
    <section class="dashboard-content">
      <div class="dashboard-header">
        <div>
          <h2>Register New Medical Practitioner</h2>
          <p style="color: var(--text-muted); font-size: 14px;">Add a new doctor to the system to enable patient creation and oncology screenings.</p>
        </div>
      </div>

      <div class="auth-card" style="max-width: 650px; margin: 0; backdrop-filter: none; background-color: white; padding: 32px;">
        <div class="alert alert-error" id="error-alert"></div>
        <div class="alert alert-success" id="success-alert"></div>

        <form id="register-doctor-form">
          <!-- Name (Row) -->
          <div class="form-row">
            <div class="form-group">
              <label for="doc_first_name" class="form-label">First Name</label>
              <input type="text" id="doc_first_name" class="form-input" placeholder="e.g. Emily" required>
            </div>
            <div class="form-group">
              <label for="doc_last_name" class="form-label">Last Name</label>
              <input type="text" id="doc_last_name" class="form-input" placeholder="e.g. Smith" required>
            </div>
          </div>

          <!-- Contacts (Row) -->
          <div class="form-row">
            <div class="form-group">
              <label for="doc_email" class="form-label">Email Address</label>
              <input type="email" id="doc_email" class="form-input" placeholder="doctor@rtooth.com" required>
            </div>
            <div class="form-group">
              <label for="doc_phone" class="form-label">Phone Number</label>
              <input type="tel" id="doc_phone" class="form-input" placeholder="+91 99887 76655" required>
            </div>
          </div>

          <!-- Password -->
          <div class="form-group">
            <label for="doc_password" class="form-label">Default Password</label>
            <input type="password" id="doc_password" class="form-input" placeholder="At least 6 characters" minlength="6" required>
          </div>

          <!-- Credentials (Row) -->
          <div class="form-row">
            <div class="form-group">
              <label for="doc_specialization" class="form-label">Oncology Specialization</label>
              <input type="text" id="doc_specialization" class="form-input" placeholder="e.g. Oral Oncologist, Oral Surgeon" required>
            </div>
            <div class="form-group">
              <label for="doc_license_number" class="form-label">Medical License ID</label>
              <input type="text" id="doc_license_number" class="form-input" placeholder="e.g. MDS-109283" required>
            </div>
          </div>

          <button type="submit" class="btn btn-primary btn-teal" style="width: 100%; height: 48px; font-size: 15px; margin-top: 12px;">
            Register Oncologist
          </button>
        </form>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer>
    <div class="container">
      <p>&copy; 2026 RTooth Clinic Management Software. Powered by Node.js & Supabase. All rights reserved.</p>
    </div>
  </footer>

  <!-- Scripts -->
  <script type="module" src="/js/auth.js"></script>
  <script type="module" src="/js/admin.js"></script>
</body>
</html>

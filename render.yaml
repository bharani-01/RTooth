services:
  - type: web
    name: rtooth-clinic
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: AUDIT_LOG_SUPABASE_URL
        sync: false
      - key: AUDIT_LOG_SUPABASE_ANON_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://rtooth-clinic.onrender.com
      - key: APP_URL
        value: https://rtooth-clinic.onrender.com
      - key: BASE_URL
        value: https://rtooth-clinic.onrender.com

